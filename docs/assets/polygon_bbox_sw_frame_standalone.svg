  <polygon points="130,80 380,60 440,180 400,330 180,340 80,220" fill="var(--color-border-secondary)" stroke="var(--color-border-primary)" stroke-width="1" opacity="0.6" style="fill:rgba(31, 30, 29, 0.3);stroke:rgba(31, 30, 29, 0.4);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

